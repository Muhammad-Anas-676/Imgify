<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Images · Imgify Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages.css">
  <script type="module" src="../js/theme.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    /* ── PAGE TOOLBAR ── */
    .page-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }
    .search-wrap .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
    }
    .search-input {
      width: 100%;
      padding: 9px 12px 9px 38px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }

    /* Filter toggle group */
    .filter-group {
      display: flex;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .filter-btn {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-body);
      background: transparent;
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .filter-btn:not(:last-child) { border-right: 1.5px solid var(--border-strong); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .bulk-delete-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--danger);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .bulk-delete-btn.visible { display: flex; }
    .bulk-delete-btn:hover { opacity: 0.88; }

    /* ── TABLE ── */
    .table-card {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
    }
    thead th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-secondary); }
    tbody td {
      padding: 10px 14px;
      color: var(--text-secondary);
      vertical-align: middle;
    }
    td.mono {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
    }
    .thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      display: block;
      background: var(--bg-tertiary);
    }
    .thumb-placeholder {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-hint);
    }
    .filename {
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      color: var(--text-primary);
    }
    .id-cell {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--text-muted);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Status pills */
    .status-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-active { background: var(--success-light); color: var(--success); }
    .status-deleted { background: var(--danger-light); color: var(--danger); }

    /* Row actions */
    .row-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .action-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .action-btn.danger { border-color: var(--danger); color: var(--danger); }
    .action-btn.danger:hover { background: var(--danger-light); }
    .action-btn.restore { border-color: var(--success); color: var(--success); }
    .action-btn.restore:hover { background: var(--success-light); }

    .copied-label {
      font-size: 11px;
      color: var(--success);
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .copied-label.show { opacity: 1; }

    /* Checkbox */
    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      gap: 12px;
      flex-wrap: wrap;
    }
    .pagination-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    .pagination-btns {
      display: flex;
      gap: 8px;
    }
    .page-btn {
      padding: 7px 18px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border-strong);
      background: transparent;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .page-btn:hover:not(:disabled) { background: var(--bg-secondary); color: var(--text-primary); }
    .page-btn:disabled { opacity: 0.38; cursor: not-allowed; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }
    .empty-state svg { margin-bottom: 16px; opacity: 0.35; }
    .empty-state p { font-size: 15px; }

    /* ── LOADING ── */
    .table-loading {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .page-header p {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Total count badge */
    .count-badge {
      display: inline-block;
      padding: 2px 10px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <a href="index.html" class="brand-link">
        <span class="brand-name">Imgify</span>
        <span class="brand-tag">Admin</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link">
        <i data-lucide="layout-dashboard"></i>
        <span>Dashboard</span>
      </a>
      <a href="images.html" class="nav-link active">
        <i data-lucide="image"></i>
        <span>Images</span>
      </a>
      <a href="albums.html" class="nav-link">
        <i data-lucide="folder"></i>
        <span>Albums</span>
      </a>
      <a href="users.html" class="nav-link">
        <i data-lucide="users"></i>
        <span>Users</span>
      </a>
      <a href="reports.html" class="nav-link">
        <i data-lucide="flag"></i>
        <span>Reports</span>
      </a>
      <a href="settings.html" class="nav-link">
        <i data-lucide="settings"></i>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
        <i data-lucide="sun"></i>
      </button>
      <button id="signOutBtn" class="sign-out-btn" aria-label="Sign out">
        <i data-lucide="log-out"></i>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <!-- TOP HEADER -->
    <header class="admin-header">
      <div class="header-left">
        <span class="header-title">Images</span>
      </div>
      <div class="header-right">
        <span id="adminEmailDisplay" class="admin-email"></span>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="admin-content">
      <div class="page-header">
        <h1>
          All Images
          <span class="count-badge" id="totalCountBadge">—</span>
        </h1>
        <p>Manage, search, and moderate all uploaded images.</p>
      </div>

      <!-- TOOLBAR -->
      <div class="page-toolbar">
        <div class="search-wrap">
          <span class="search-icon"><i data-lucide="search" style="width:15px;height:15px;"></i></span>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search by filename or image ID…"
            aria-label="Search images"
          >
        </div>

        <div class="filter-group" role="group" aria-label="Filter by status">
          <button class="filter-btn active" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="deleted">Deleted</button>
          <button class="filter-btn" data-filter="all">All</button>
        </div>

        <button class="bulk-delete-btn" id="bulkDeleteBtn" aria-label="Bulk delete selected">
          <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
          Delete Selected (<span id="selectedCount">0</span>)
        </button>
      </div>

      <!-- TABLE CARD -->
      <div class="table-card">
        <div class="table-scroll">
          <table id="imagesTable" aria-label="Images table">
            <thead>
              <tr>
                <th style="width:36px;">
                  <input type="checkbox" id="selectAllChk" aria-label="Select all">
                </th>
                <th style="width:50px;">Thumb</th>
                <th>File Name</th>
                <th>ID</th>
                <th>Size</th>
                <th>Views</th>
                <th>Uploaded</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr>
                <td colspan="9">
                  <div class="table-loading">
                    <i data-lucide="loader-2" style="width:20px;height:20px;display:inline-block;animation:spin 1s linear infinite;"></i>
                    &nbsp;Loading images…
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- PAGINATION -->
        <div class="pagination" id="paginationBar">
          <span class="pagination-info" id="pageInfo">Page 1</span>
          <div class="pagination-btns">
            <button class="page-btn" id="prevBtn" disabled aria-label="Previous page">← Prev</button>
            <button class="page-btn" id="nextBtn" disabled aria-label="Next page">Next →</button>
          </div>
        </div>
      </div>
    </div><!-- /admin-content -->
  </main>
</div>

<!-- TOAST -->
<div id="toastContainer" class="toast-container" aria-live="polite"></div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script type="module">
  import { auth, db } from '../js/firebase-init.js';
  import { initAdminAuth, handleAdminLogout } from '../js/admin/admin-auth.js';
  import {
    collection, query, where, getDocs, orderBy,
    startAfter, limit, updateDoc, deleteDoc, doc,
    getCountFromServer
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  initAdminAuth(async (user) => {

  // ── Init Lucide
  lucide.createIcons();

  // ── State
  const PAGE_SIZE = 20;
  let currentFilter = 'active'; // 'active' | 'deleted' | 'all'
  let searchQuery   = '';
  let currentPage   = 1;
  let pageStack     = [];   // array of first-doc snapshots per page (index 0 = page 1)
  let lastDocSnap   = null;
  let allLoadedRows = [];   // raw Firestore docs for current page (used for client search)
  let selectedIds   = new Set();

  // ── DOM refs
  const tableBody      = document.getElementById('tableBody');
  const searchInput    = document.getElementById('searchInput');
  const prevBtn        = document.getElementById('prevBtn');
  const nextBtn        = document.getElementById('nextBtn');
  const pageInfo       = document.getElementById('pageInfo');
  const selectAllChk   = document.getElementById('selectAllChk');
  const bulkDeleteBtn  = document.getElementById('bulkDeleteBtn');
  const selectedCount  = document.getElementById('selectedCount');
  const totalCountBadge = document.getElementById('totalCountBadge');

  // ── Admin email display
  auth.onAuthStateChanged(user => {
    if (user) {
      const el = document.getElementById('adminEmailDisplay');
      if (el) el.textContent = user.email;
    }
  });

  // ── Sign out
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = '/admin/login';
  });

  // ── Theme toggle
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('imgify-theme', isDark ? 'light' : 'dark');
    lucide.createIcons();
  });

  // ── Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      resetAndLoad();
    });
  });

  // ── Search (client-side filter on loaded page data)
  let searchDebounce;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      searchQuery = searchInput.value.trim().toLowerCase();
      renderRows(allLoadedRows);
    }, 300);
  });

  // ── Firestore query builder
  function buildQuery(afterDoc = null) {
    const col = collection(db, 'uploads');
    const constraints = [];

    if (currentFilter === 'active')  constraints.push(where('deleted', '==', false));
    if (currentFilter === 'deleted') constraints.push(where('deleted', '==', true));

    constraints.push(orderBy('uploadedAt', 'desc'));
    if (afterDoc) constraints.push(startAfter(afterDoc));
    constraints.push(limit(PAGE_SIZE));

    return query(col, ...constraints);
  }

  // ── Fetch total count for badge
  async function fetchTotalCount() {
    try {
      const col = collection(db, 'uploads');
      const constraints = [];
      if (currentFilter === 'active')  constraints.push(where('deleted', '==', false));
      if (currentFilter === 'deleted') constraints.push(where('deleted', '==', true));
      const q = constraints.length ? query(col, ...constraints) : query(col);
      const snap = await getCountFromServer(q);
      totalCountBadge.textContent = snap.data().count.toLocaleString();
    } catch {
      totalCountBadge.textContent = '—';
    }
  }

  // ── Reset pagination and reload
  function resetAndLoad() {
    currentPage = 1;
    pageStack   = [];
    lastDocSnap = null;
    selectedIds.clear();
    updateBulkUI();
    selectAllChk.checked = false;
    loadPage(null);
    fetchTotalCount();
  }

  // ── Load page from Firestore
  async function loadPage(afterDoc) {
    showLoading();
    try {
      const q   = buildQuery(afterDoc);
      const snap = await getDocs(q);
      const docs = snap.docs;

      allLoadedRows = docs;
      lastDocSnap   = docs.length > 0 ? docs[docs.length - 1] : null;

      renderRows(docs);
      updatePagination(docs.length);
    } catch (err) {
      console.error(err);
      showError('Failed to load images. Check Firestore permissions.');
    }
  }

  // ── Render rows (with client-side search filter)
  function renderRows(docs) {
    const filtered = searchQuery
      ? docs.filter(d => {
          const data = d.data();
          const name = (data.customName || data.fileName || '').toLowerCase();
          const id   = d.id.toLowerCase();
          return name.includes(searchQuery) || id.includes(searchQuery);
        })
      : docs;

    if (filtered.length === 0) {
      tableBody.innerHTML = `
        <tr><td colspan="9">
          <div class="empty-state">
            <i data-lucide="image-off" style="width:40px;height:40px;display:block;margin:0 auto 12px;"></i>
            <p>${searchQuery ? 'No images match your search.' : 'No images found.'}</p>
          </div>
        </td></tr>`;
      lucide.createIcons();
      return;
    }

    tableBody.innerHTML = filtered.map(d => buildRow(d)).join('');
    lucide.createIcons();

    // Restore checkbox state
    tableBody.querySelectorAll('.row-chk').forEach(chk => {
      chk.checked = selectedIds.has(chk.dataset.id);
      chk.addEventListener('change', onRowCheckChange);
    });
  }

  // ── Build single table row HTML
  function buildRow(docSnap) {
    const data = docSnap.data();
    const id   = docSnap.id;

    const name     = escHtml(data.customName || data.fileName || 'Untitled');
    const url      = data.url || data.imgbbUrl || '';
    const thumb    = data.thumbUrl || data.imgbbThumbUrl || url;
    const size     = formatBytes(data.fileSize || 0);
    const views    = (data.viewCount || 0).toLocaleString();
    const uploaded = formatDate(data.uploadedAt);
    const deleted  = data.deleted === true;

    const statusPill = deleted
      ? `<span class="status-pill status-deleted">Deleted</span>`
      : `<span class="status-pill status-active">Active</span>`;

    const thumbHtml = thumb
      ? `<img src="${escHtml(thumb)}" class="thumb" alt="${name}" loading="lazy">`
      : `<div class="thumb-placeholder"><i data-lucide="image" style="width:16px;height:16px;"></i></div>`;

    const actionDelete = deleted
      ? `<button class="action-btn restore" data-id="${id}" data-action="restore" aria-label="Restore image">
           <i data-lucide="rotate-ccw" style="width:12px;height:12px;"></i> Restore
         </button>`
      : `<button class="action-btn danger" data-id="${id}" data-action="delete" aria-label="Delete image">
           <i data-lucide="trash-2" style="width:12px;height:12px;"></i> Delete
         </button>`;

    return `
      <tr data-id="${id}">
        <td><input type="checkbox" class="row-chk" data-id="${id}" aria-label="Select row"></td>
        <td>${thumbHtml}</td>
        <td><div class="filename" title="${name}">${name}</div></td>
        <td><div class="id-cell" title="${id}">${id}</div></td>
        <td>${size}</td>
        <td>${views}</td>
        <td>${uploaded}</td>
        <td>${statusPill}</td>
        <td>
          <div class="row-actions">
            <a href="/image.html?id=${id}" target="_blank" class="action-btn" aria-label="View image">
              <i data-lucide="external-link" style="width:12px;height:12px;"></i> View
            </a>
            <button class="action-btn" data-id="${id}" data-url="${escHtml(url)}" data-action="copy" aria-label="Copy URL">
              <i data-lucide="copy" style="width:12px;height:12px;"></i> Copy URL
            </button>
            <span class="copied-label" id="copied-${id}">Copied!</span>
            ${actionDelete}
          </div>
        </td>
      </tr>`;
  }

  // ── Table action delegation
  tableBody.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;

    const action = btn.dataset.action;
    const id     = btn.dataset.id;

    if (action === 'copy') {
      const url = btn.dataset.url;
      try {
        await navigator.clipboard.writeText(url);
        const label = document.getElementById(`copied-${id}`);
        if (label) {
          label.classList.add('show');
          setTimeout(() => label.classList.remove('show'), 1800);
        }
      } catch {
        showToast('Failed to copy — check clipboard permissions.', 'error');
      }
    }

    if (action === 'delete') {
      if (!confirm('Soft-delete this image? It will be hidden from public.')) return;
      try {
        await updateDoc(doc(db, 'uploads', id), { deleted: true });
        showToast('Image deleted.', 'success');
        resetAndLoad();
      } catch (err) {
        showToast('Delete failed: ' + err.message, 'error');
      }
    }

    if (action === 'restore') {
      try {
        await updateDoc(doc(db, 'uploads', id), { deleted: false });
        showToast('Image restored.', 'success');
        resetAndLoad();
      } catch (err) {
        showToast('Restore failed: ' + err.message, 'error');
      }
    }
  });

  // ── Checkboxes
  function onRowCheckChange(e) {
    const id = e.target.dataset.id;
    if (e.target.checked) {
      selectedIds.add(id);
    } else {
      selectedIds.delete(id);
      selectAllChk.checked = false;
    }
    updateBulkUI();
  }

  selectAllChk.addEventListener('change', () => {
    const checked = selectAllChk.checked;
    tableBody.querySelectorAll('.row-chk').forEach(chk => {
      chk.checked = checked;
      if (checked) selectedIds.add(chk.dataset.id);
      else         selectedIds.delete(chk.dataset.id);
    });
    updateBulkUI();
  });

  function updateBulkUI() {
    const count = selectedIds.size;
    selectedCount.textContent = count;
    if (count > 0) {
      bulkDeleteBtn.classList.add('visible');
    } else {
      bulkDeleteBtn.classList.remove('visible');
    }
  }

  // ── Bulk delete
  bulkDeleteBtn.addEventListener('click', async () => {
    const count = selectedIds.size;
    if (count === 0) return;
    if (!confirm(`Soft-delete ${count} selected image(s)?`)) return;

    bulkDeleteBtn.disabled = true;
    bulkDeleteBtn.textContent = 'Deleting…';

    try {
      const updates = Array.from(selectedIds).map(id =>
        updateDoc(doc(db, 'uploads', id), { deleted: true })
      );
      await Promise.all(updates);
      showToast(`${count} image(s) deleted.`, 'success');
      selectedIds.clear();
      updateBulkUI();
      selectAllChk.checked = false;
      resetAndLoad();
    } catch (err) {
      showToast('Bulk delete failed: ' + err.message, 'error');
    } finally {
      bulkDeleteBtn.disabled = false;
      bulkDeleteBtn.innerHTML = `<i data-lucide="trash-2" style="width:14px;height:14px;"></i> Delete Selected (<span id="selectedCount">0</span>)`;
      lucide.createIcons();
    }
  });

  // ── Pagination
  function updatePagination(rowCount) {
    pageInfo.textContent = `Page ${currentPage}`;
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = rowCount < PAGE_SIZE;
  }

  prevBtn.addEventListener('click', () => {
    if (currentPage <= 1) return;
    currentPage--;
    // Pop back: page N uses pageStack[N-2] (0-indexed), or null for page 1
    pageStack.pop(); // remove current page's start cursor
    const afterDoc = pageStack.length > 0 ? pageStack[pageStack.length - 1] : null;
    loadPage(afterDoc);
  });

  nextBtn.addEventListener('click', () => {
    if (!lastDocSnap) return;
    pageStack.push(lastDocSnap);
    currentPage++;
    loadPage(lastDocSnap);
  });

  // ── Helpers
  function showLoading() {
    tableBody.innerHTML = `
      <tr><td colspan="9">
        <div class="table-loading">
          <i data-lucide="loader-2" style="width:20px;height:20px;display:inline-block;animation:spin 1s linear infinite;"></i>
          &nbsp;Loading images…
        </div>
      </td></tr>`;
    lucide.createIcons();
  }

  function showError(msg) {
    tableBody.innerHTML = `
      <tr><td colspan="9">
        <div class="empty-state">
          <i data-lucide="alert-circle" style="width:32px;height:32px;display:block;margin:0 auto 12px;color:var(--danger);opacity:1;"></i>
          <p style="color:var(--danger);">${escHtml(msg)}</p>
        </div>
      </td></tr>`;
    lucide.createIcons();
  }

  function formatBytes(bytes) {
    if (!bytes) return '—';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // ── Initial load
  resetAndLoad();
  }); // end initAdminAuth
</script>

</body>
</html>
